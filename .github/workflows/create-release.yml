name: Create release from tag

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow creating releases
permissions:
  contents: write

jobs:
  # Single job: Maven and VS Code extension steps are sequential because
  # the VSIX packaging depends on the Maven-built platform archives.
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # ─── Pre-flight: fail fast if not dispatched on a tag ──────────────
      # The Release step below is gated by `startsWith(github.ref, 'refs/tags/')`,
      # so if the workflow is dispatched against a branch the build runs to
      # completion but no release is published. That's confusing and wastes
      # CI time, so abort up front with a clear message.
      - name: Verify tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "::error ::This workflow must be dispatched on a tag ref, but got '${GITHUB_REF}'."
            echo "::error ::In the 'Run workflow' dialog, pick the tag (e.g. v1.2.3) from the 'Use workflow from' dropdown."
            echo "::error ::Tip: draft the release and its tag first, then dispatch this workflow against that tag."
            exit 1
          fi
          echo "OK — dispatched on tag '${GITHUB_REF#refs/tags/}'."

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          mvn-toolchain-id: JavaSE-21
          distribution: 'sapmachine'

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: 3.9.11

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      # ─── Java side: build all 4 platform products ───────────────────────
      - name: Build with Maven
        run: mvn --batch-mode clean package -DskipTests

      # ─── VS Code extension side: install deps + compile TypeScript once ──
      - name: Install extension deps
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      # ─── Build one VSIX per platform, each bundling the matching binary ──
      #
      # The product zips/tarballs from Maven each contain a top-level `abapcleaner/`
      # folder (see com.sap.adt.abapcleaner.app/pom.xml `rootFolder`).
      # For each platform: extract the archive into vscode-extension/binary/,
      # package the VSIX, then clear the binary/ folder before the next platform.
      #
      # VSIX naming is: abapcleaner-vscode-<platform>.vsix
      #
      # `--baseContentUrl` / `--baseImagesUrl` are passed explicitly so that
      # relative links/images in the extension README resolve correctly when
      # the VSIX is installed outside the Marketplace. For BASE_IMAGE_URL, 
      # https://raw.githubusercontent.com... is one redirect less than 
      # https://github.com/SAP/abap-cleaner/raw/${tag}/... would be
      - name: Package VSIX (all platforms)
        shell: bash
        working-directory: vscode-extension
        env:
          # Each line: "<archive-suffix>|<archive-format>|<vsce-target>"
          # The archive suffix is also reused for the VSIX file name.
          PLATFORMS: |
            linux.gtk.x86_64|tar.gz|linux-x64
            macosx.cocoa.aarch64|tar.gz|darwin-arm64
            macosx.cocoa.x86_64|tar.gz|darwin-x64
            win32.win32.x86_64|zip|win32-x64
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          BASE_CONTENT_URL="https://github.com/SAP/abap-cleaner/blob/${tag}/vscode-extension/"
          BASE_IMAGES_URL="https://raw.githubusercontent.com/SAP/abap-cleaner/${tag}/vscode-extension/"
          while IFS='|' read -r suffix archive_fmt target; do
            [ -z "$suffix" ] && continue
            archive="../com.sap.adt.abapcleaner.app/target/products/com.sap.adt.abapcleaner.app-${suffix}.${archive_fmt}"
            echo "::group::Package VSIX — ${suffix}"
            rm -rf binary
            mkdir -p binary
            case "$archive_fmt" in
              tar.gz) tar -xzf "$archive" -C binary ;;
              zip)    unzip -q "$archive" -d binary ;;
              *)      echo "Unknown archive format: $archive_fmt" >&2; exit 1 ;;
            esac

            # Sanity-check the extracted layout matches what BinaryManager.ts looks for.
            # Tycho's <rootFolder> wraps Linux/Windows archives in `abapcleaner/`, but the
            # macOS tar.gz puts `abapcleaner.app` at the archive root — so the runtime has
            # to support both shapes. If neither shape produces an executable binary,
            # fail the build instead of shipping a broken VSIX.
            case "$target" in
              win32-x64)
                exe="binary/abapcleaner/abap-cleaner.exe"
                [ -f "$exe" ] || { echo "::error ::Missing $exe after extracting $archive"; exit 1; }
                ;;
              darwin-*)
                exe="binary/abapcleaner.app/Contents/MacOS/abap-cleaner"
                [ -x "$exe" ] || { echo "::error ::$exe missing or not executable after extracting $archive"; exit 1; }
                ;;
              linux-x64)
                exe="binary/abapcleaner/abap-cleaner"
                [ -x "$exe" ] || { echo "::error ::$exe missing or not executable after extracting $archive"; exit 1; }
                ;;
            esac

            ./node_modules/.bin/vsce package \
                --target "$target" \
                --skip-license \
                --allow-missing-repository \
                --baseContentUrl "$BASE_CONTENT_URL" \
                --baseImagesUrl "$BASE_IMAGES_URL" \
                --out "abapcleaner-vscode-${suffix}.vsix"
            echo "::endgroup::"
          done <<< "$PLATFORMS"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag" --clobber \
            com.sap.adt.abapcleaner.app/target/products/com.sap.adt.abapcleaner.app-linux.gtk.x86_64.tar.gz \
            com.sap.adt.abapcleaner.app/target/products/com.sap.adt.abapcleaner.app-macosx.cocoa.aarch64.tar.gz \
            com.sap.adt.abapcleaner.app/target/products/com.sap.adt.abapcleaner.app-macosx.cocoa.x86_64.tar.gz \
            com.sap.adt.abapcleaner.app/target/products/com.sap.adt.abapcleaner.app-win32.win32.x86_64.zip \
            com.sap.adt.abapcleaner.updatesite/target/com.sap.adt.abapcleaner.updatesite.zip \
            vscode-extension/abapcleaner-vscode-linux.gtk.x86_64.vsix \
            vscode-extension/abapcleaner-vscode-macosx.cocoa.aarch64.vsix \
            vscode-extension/abapcleaner-vscode-macosx.cocoa.x86_64.vsix \
            vscode-extension/abapcleaner-vscode-win32.win32.x86_64.vsix
          cat > /tmp/release-notes.md << 'NOTES'
          We recommend using the ABAP cleaner **plug-in for ADT** (see [installation instructions](https://github.com/SAP/abap-cleaner/blob/main/README.md)), which cleans up your code directly from within the IDE, and checks for updates automatically. If you nevertheless prefer to use the **stand-alone version** of ABAP cleaner (e.g. in order to use it with SAP GUI or from the command line), please

          * expand "Assets" below and download the archive for your operating system
          * extract the archive
          * on macOS:
            * Move abapcleaner.app to a different directory (e.g. /Applications/abapcleaner.app), do not start it directly from ~/Downloads.
            * Remove quarantine attribute from abapcleaner.app, otherwise the app won't start (because it is not code-signed):
              `xattr -dr com.apple.quarantine /Applications/abapcleaner.app`
          * start ABAP cleaner

          Please check this site for updates since there is currently no automatic update mechanism for the stand-alone version. [Release notes](https://github.com/SAP/abap-cleaner/blob/main/docs/release-notes.md) are the same for both the ADT plug-in and the stand-alone version.

          ### VS Code extension

          The **ABAP cleaner extension for Visual Studio Code** can be installed directly from the [Visual Studio Marketplace](https://marketplace.visualstudio.com/items?itemName=SAPOSS.abap-cleaner) (recommended). Alternatively, you can install it with the following steps:

          * expand "Assets" below and download the `.vsix` file for your platform (`abapcleaner-vscode-<platform>.vsix`)
          * start VS Code and install the extension with the command 'Extensions: Install from VSIX...'
          NOTES
          gh release edit "$tag" --draft=false --notes-file /tmp/release-notes.md
